<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Rezepte</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #FFC0CB;
      color: #222;
    }
a {
  color: blue;
  text-decoration: underline;
}
    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 25px;
    }
    
.title-text {
  color: white;
}
    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: pink;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .recipe {
      border-top: 1px solid #eee;
      padding-top: 12px;
      margin-top: 12px;
    }

    .recipe h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .small {
      color: #666;
      font-size: 14px;
    }

    .tags {
  font-size: 14px;
  font-style: italic;
  color: #555;
}

    .content-text {
  font-size: 16px;
  color: #000;
}
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      width: auto;
      padding: 10px 14px;
    }

    #search {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      ⭐️🌸🧸🌿<br>
        <span class="title-text">MY RECIPES</span><br>
      ⭐️🌸🧸🌿
    </h1>

    <div class="card">
      <h2>New Recipe</h2>
      <input type="text" id="name" placeholder="Name" />
      <input type="text" id="tags" placeholder="Tags" />
      <textarea id="ingredients" placeholder="What"></textarea>
      <textarea id="instructions" placeholder="How"></textarea>
      <button onclick="saveRecipe()">Save ⭐️</button>
    </div>

    <div class="card">
      <h2>Search</h2>
      <input type="text" id="searchTitle" placeholder="Title ..." oninput="renderRecipes()" />
<input type="text" id="searchTags" placeholder="Tags ..." oninput="renderRecipes()" />
<input type="text" id="searchIngredients" placeholder="Ingredients ..." oninput="renderRecipes()" />
    </div>

    <div class="card">
      <h2>My Recipes</h2>
      <div id="recipeList"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://kdmdujfykezsyadtskcv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_qYiTwL6d6p4r-dzbK5Bm8A_qS28j4zk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let recipes = [];
    let editId = null;

    function linkify(text) {
  if (!text) return "";
  return text
    .replace(
      /(https?:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
    )
    .replace(/\n/g, "<br>");
}

    async function loadRecipes() {
      const { data, error } = await supabase
        .from("recipes")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Fehler beim Laden:", error);
        alert("Rezepte konnten nicht geladen werden.");
        return;
      }

      recipes = data || [];
      renderRecipes();
    }

    window.saveRecipe = async function () {
      const title = document.getElementById("name").value.trim();
      const tags = document.getElementById("tags").value.trim();
      const ingredients = document.getElementById("ingredients").value.trim();
      const instructions = document.getElementById("instructions").value.trim();

      if (!title || !ingredients || !instructions) {
        alert("Bitte mindestens Name, Zutaten und Zubereitung ausfüllen.");
        return;
      }

      if (editId === null) {
        const { error } = await supabase.from("recipes").insert([
          { title, tags, ingredients, instructions }
        ]);

        if (error) {
          console.error("Fehler beim Speichern:", error);
          alert("Rezept konnte nicht gespeichert werden.");
          return;
        }
      } else {
        const { error } = await supabase
          .from("recipes")
          .update({ title, tags, ingredients, instructions })
          .eq("id", editId);

        if (error) {
          console.error("Fehler beim Aktualisieren:", error);
          alert("Rezept konnte nicht aktualisiert werden.");
          return;
        }

        editId = null;
      }

      document.getElementById("name").value = "";
      document.getElementById("tags").value = "";
      document.getElementById("ingredients").value = "";
      document.getElementById("instructions").value = "";

      await loadRecipes();
    };

    window.renderRecipes = function () {
      const list = document.getElementById("recipeList");
      const searchTitle = document.getElementById("searchTitle").value.toLowerCase();
const searchTags = document.getElementById("searchTags").value.toLowerCase();
const searchIngredients = document.getElementById("searchIngredients").value.toLowerCase();

      list.innerHTML = "";

const filteredRecipes = recipes.filter(recipe => {
  const titleMatch = (recipe.title || "").toLowerCase().includes(searchTitle);

  const recipeTags = (recipe.tags || "")
    .toLowerCase()
    .split(/[;,]/)
    .map(t => t.trim())
    .filter(t => t);

  const searchTagsArray = searchTags
    .toLowerCase()
    .split(/[;,]/)
    .map(t => t.trim())
    .filter(t => t);

 const tagsMatch =
  searchTagsArray.length === 0 ||
  searchTagsArray.every(searchTag =>
    recipeTags.some(recipeTag => recipeTag.includes(searchTag))
  );

  const ingredientsText = (recipe.ingredients || "").toLowerCase();

  const searchIngredientsArray = searchIngredients
    .toLowerCase()
    .split(/[,\n;]/)
    .map(i => i.trim())
    .filter(i => i);

  const ingredientsMatch =
    searchIngredientsArray.length === 0 ||
    searchIngredientsArray.every(searchIngredient =>
      ingredientsText.includes(searchIngredient)
    );

  return titleMatch && tagsMatch && ingredientsMatch;
});

      if (filteredRecipes.length === 0) {
        list.innerHTML = "<p>Keine Rezepte gefunden.</p>";
        return;
      }

      filteredRecipes.forEach((recipe) => {
        const div = document.createElement("div");
        div.className = "recipe";
        div.innerHTML = `
  <h3>${recipe.title}</h3>
 <p class="tags"><strong>Tags:</strong> ${recipe.tags || "-"}</p>
<p class="content-text"><strong>Zutaten:</strong><br>${linkify(recipe.ingredients || "")}</p>
<p class="content-text"><strong>Zubereitung:</strong><br>${linkify(recipe.instructions || "")}</p>
  <div class="actions">
    <button onclick="editRecipe(${recipe.id})">Bearbeiten</button>
    <button onclick="deleteRecipe(${recipe.id})">Löschen</button>
  </div>
`;
        list.appendChild(div);
      });
    };

    window.deleteRecipe = async function (id) {
      if (!confirm("Willst du dieses Rezept wirklich löschen?")) return;

      const { error } = await supabase
        .from("recipes")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("Fehler beim Löschen:", error);
        alert("Rezept konnte nicht gelöscht werden.");
        return;
      }

      await loadRecipes();
    };

    window.editRecipe = function (id) {
      const recipe = recipes.find(r => r.id === id);
      if (!recipe) return;

      document.getElementById("name").value = recipe.title || "";
      document.getElementById("tags").value = recipe.tags || "";
      document.getElementById("ingredients").value = recipe.ingredients || "";
      document.getElementById("instructions").value = recipe.instructions || "";

      editId = id;
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    loadRecipes();
  </script>
</body>
</html>
