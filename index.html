<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Rezepte</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #FFC0CB;
      color: #222;
    }
a {
  color: blue;
  text-decoration: underline;
}
    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 38px;
    }
    
.title-text {
  color: white;
}
    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: pink;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .recipe {
      border-top: 1px solid #eee;
      padding-top: 12px;
      margin-top: 12px;
    }

    .recipe h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .recipe-image {
  display: block;
  width: 100%;
  max-width: 320px;
  height: auto;
  border-radius: 12px;
  margin: 10px 0 12px 0;
  object-fit: cover;
}

    .small {
      color: #666;
      font-size: 14px;
    }

.tags {
  margin: 10px 0 14px 0;
}

.tags-label {
  display: block;
  font-size: 14px;
  font-weight: bold;
  color: #555;
  margin-bottom: 8px;
}

.tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.tag-pill {
  display: inline-block;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: bold;
  line-height: 1;
  background: pink;
  color: white;
}

    .content-text {
  font-size: 16px;
  color: #000;
}
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      width: auto;
      padding: 10px 14px;
    }

    #search {
      margin-bottom: 0;
    }

    input:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: #ccc;
  box-shadow: none;
}
       select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  background: white;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  color: #222;
}

select:invalid {
  color: #999;
}
    .recipe-title-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

    .status-pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      line-height: 1;
    }

    .status-tested {
      background: #dfeee3;
      color: #4f6b57;
    }

    .status-new {
      background: #ffe4cc;
      color: #b56a2d;
    }
    .tag-filter-wrap {
  position: relative;
}

#searchTags {
  margin-bottom: 12px;
  cursor: pointer;
  background: white;
}

.tag-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  width: 100%;
  background: white;
  border: 1px solid #ddd;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 10px;
  z-index: 999;
}

.tag-dropdown.hidden {
  display: none;
}

#tagDropdownSearch {
  margin-top: 0;
  margin-bottom: 10px;
}

.tag-options {
  max-height: 220px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.tag-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s ease;
  user-select: none;
}

.tag-option:hover {
  background: #f8f8f8;
}

.tag-option input[type="checkbox"] {
  width: auto;
  margin: 0;
  padding: 0;
}

.tag-option.empty {
  color: #777;
  cursor: default;
}
    .tag-clear-btn {
  width: 100%;
  margin-top: 0;
  margin-bottom: 10px;
  background: #fff4f7;
  color: #d85c8d;
  border: 1px solid #f3c3d3;
  font-weight: bold;
  text-align: left;
}

.tag-clear-btn:hover {
  background: #ffeaf1;
}

.tag-group {
  margin-bottom: 12px;
}

.tag-group-title {
  font-size: 13px;
  font-weight: bold;
  color: #d85c8d;
  padding: 4px 8px;
  margin-bottom: 4px;
}

.tag-group-items {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

input[type="file"] {
  color: #999;
}

input[type="file"]::file-selector-button {
  color: #999;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px 14px;
  margin-right: 10px;
  cursor: pointer;
}

input[type="file"]::-webkit-file-upload-button {
  color: #999;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px 14px;
  margin-right: 10px;
  cursor: pointer;
}    
    
  </style>
</head>
<body>
  <div class="container">
    <h1>
      ⭐️🌸🧸🌿<br>
        <span class="title-text">MY RECIPES</span><br>
      ⭐️🌸🧸🌿
    </h1>

    <div class="card">
      <h2>New Recipe</h2>
     <input type="text" id="name" placeholder="Name" />
<input type="text" id="tags" placeholder="Tags" />

<select id="status" required>
  <option value="" disabled selected hidden>Status</option>
  <option value="tested">Tested</option>
  <option value="new">New</option>
</select>

<input type="file" id="image" accept="image/*" />
<textarea id="ingredients" placeholder="What"></textarea>
<textarea id="instructions" placeholder="How"></textarea>
<button onclick="saveRecipe()">Save ⭐️</button>
</div>
    <div class="card">
      <h2>Search</h2>
     <input type="text" id="searchTitle" placeholder="Title" oninput="renderRecipes()" />
<div class="tag-filter-wrap">
  <input type="text" id="searchTags" placeholder="Tags" readonly />
  <div id="tagDropdown" class="tag-dropdown hidden">
  <div id="tagDropdown" class="tag-dropdown hidden">
  <input type="text" id="tagDropdownSearch" placeholder="Search tags" />
  <button type="button" id="clearTagSelection" class="tag-clear-btn">Clear all selections</button>
  <div id="tagOptions" class="tag-options"></div>
</div>
</div>
<input type="text" id="searchIngredients" placeholder="Ingredients" oninput="renderRecipes()" />

<select id="searchStatus" onchange="renderRecipes()">
  <option value="tested" selected>Tested</option>
  <option value="new">New</option>
  <option value="all">All</option>
</select>
    </div>

    <div class="card">
      <h2>My Recipes</h2>
      <div id="recipeList"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://kdmdujfykezsyadtskcv.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_qYiTwL6d6p4r-dzbK5Bm8A_qS28j4zk";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

   let recipes = [];
let editId = null;
let selectedSearchTags = [];

const TAG_GROUPS = {
  "Main ingredient": ["Meat", "Chicken", "Fish", "Vegetarian"],
  "Difficulty": ["Easy", "Medium", "Hard"]
};

const MAIN_TAG_ORDER = ["Meat", "Chicken", "Fish", "Vegetarian"];
const DIFFICULTY_TAG_ORDER = ["Easy", "Medium", "Hard"];

   async function uploadImage(file) {
  if (!file) return null;

  const fileExt = file.name.split(".").pop();
  const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.${fileExt}`;
  const filePath = `recipes/${fileName}`;

  const { error } = await supabase.storage
    .from("recipe-images")
    .upload(filePath, file);

if (error) {
  console.error("UPLOAD ERROR:", error);
  alert("Upload Fehler: " + error.message);
  return null;
}

  const { data } = supabase.storage
    .from("recipe-images")
    .getPublicUrl(filePath);

  return data.publicUrl;
}

function linkify(text) {
  if (!text) return "";
  return text
    .replace(
      /(https?:\/\/[^\s<]+)/g,
      '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
    )
    .replace(/\n/g, "<br>");
}

function parseTags(tagsString) {
  if (!tagsString) return [];

  return tagsString
    .split(/[;,]/)
    .map(tag => tag.trim())
    .filter(tag => tag.length > 0);
}
    function sortTags(tagsArray) {
  if (!tagsArray || !tagsArray.length) return [];

  const normalizedMainTags = new Map(
    MAIN_TAG_ORDER.map(tag => [tag.toLowerCase(), tag])
  );

  const normalizedDifficultyTags = new Map(
    DIFFICULTY_TAG_ORDER.map(tag => [tag.toLowerCase(), tag])
  );

  const seen = new Set();
  const cleanedTags = tagsArray
    .map(tag => tag.trim())
    .filter(tag => tag.length > 0)
    .filter(tag => {
      const key = tag.toLowerCase();
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

  const mainTags = [];
  const otherTags = [];
  const difficultyTags = [];

  cleanedTags.forEach(tag => {
    const lowerTag = tag.toLowerCase();

    if (normalizedMainTags.has(lowerTag)) {
      mainTags.push(normalizedMainTags.get(lowerTag));
    } else if (normalizedDifficultyTags.has(lowerTag)) {
      difficultyTags.push(normalizedDifficultyTags.get(lowerTag));
    } else {
      otherTags.push(tag);
    }
  });

  mainTags.sort((a, b) => MAIN_TAG_ORDER.indexOf(a) - MAIN_TAG_ORDER.indexOf(b));

  otherTags.sort((a, b) =>
    a.localeCompare(b, "de", { sensitivity: "base" })
  );

  difficultyTags.sort((a, b) =>
    DIFFICULTY_TAG_ORDER.indexOf(a) - DIFFICULTY_TAG_ORDER.indexOf(b)
  );

  return [...mainTags, ...otherTags, ...difficultyTags];
}
  
function getAllTags() {
  const tagSet = new Set();

  recipes.forEach(recipe => {
    parseTags(recipe.tags).forEach(tag => tagSet.add(tag));
  });

  return [...tagSet].sort((a, b) => a.localeCompare(b, "de", { sensitivity: "base" }));
}

function syncSearchTagsInput() {
  const input = document.getElementById("searchTags");
  input.value = selectedSearchTags.join(", ");
  renderRecipes();
}

function renderTagDropdown(filterText = "") {
  const tagOptions = document.getElementById("tagOptions");
  const allTags = getAllTags();
  const filter = filterText.toLowerCase();

  let html = "";
  let hasVisibleTags = false;

  Object.entries(TAG_GROUPS).forEach(([groupName, groupTags]) => {
    const availableTags = groupTags.filter(groupTag =>
      allTags.some(existingTag => existingTag.toLowerCase() === groupTag.toLowerCase())
    );

    const filteredGroupTags = availableTags.filter(tag =>
      tag.toLowerCase().includes(filter)
    );

    if (filteredGroupTags.length > 0) {
      hasVisibleTags = true;

      html += `
        <div class="tag-group">
          <div class="tag-group-title">${groupName}</div>
          <div class="tag-group-items">
            ${filteredGroupTags.map(tag => {
              const checked = selectedSearchTags.includes(tag) ? "checked" : "";
              return `
                <label class="tag-option">
                  <input type="checkbox" value="${tag}" ${checked}>
                  <span>${tag}</span>
                </label>
              `;
            }).join("")}
          </div>
        </div>
      `;
    }
  });

  const groupedTagsFlat = Object.values(TAG_GROUPS).flat().map(tag => tag.toLowerCase());

  const otherTags = allTags.filter(tag =>
    !groupedTagsFlat.includes(tag.toLowerCase()) &&
    tag.toLowerCase().includes(filter)
  );

  if (otherTags.length > 0) {
    hasVisibleTags = true;

    html += `
      <div class="tag-group">
        <div class="tag-group-title">Other tags</div>
        <div class="tag-group-items">
          ${otherTags.map(tag => {
            const checked = selectedSearchTags.includes(tag) ? "checked" : "";
            return `
              <label class="tag-option">
                <input type="checkbox" value="${tag}" ${checked}>
                <span>${tag}</span>
              </label>
            `;
          }).join("")}
        </div>
      </div>
    `;
  }

  if (!hasVisibleTags) {
    tagOptions.innerHTML = `<div class="tag-option empty">No tags found.</div>`;
    return;
  }

  tagOptions.innerHTML = html;

  tagOptions.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
    checkbox.addEventListener("change", (e) => {
      const tag = e.target.value;

      if (e.target.checked) {
        if (!selectedSearchTags.includes(tag)) {
          selectedSearchTags.push(tag);
        }
      } else {
        selectedSearchTags = selectedSearchTags.filter(t => t !== tag);
      }

     selectedSearchTags = sortTags(selectedSearchTags);
      syncSearchTagsInput();
      renderTagDropdown(document.getElementById("tagDropdownSearch").value);
    });
  });
}

function setupTagDropdown() {
  const searchTagsInput = document.getElementById("searchTags");
  const tagDropdown = document.getElementById("tagDropdown");
  const tagDropdownSearch = document.getElementById("tagDropdownSearch");
  const clearTagSelection = document.getElementById("clearTagSelection");

  searchTagsInput.addEventListener("focus", () => {
    tagDropdown.classList.remove("hidden");
    tagDropdownSearch.value = "";
    renderTagDropdown("");
  });

  searchTagsInput.addEventListener("click", () => {
    tagDropdown.classList.remove("hidden");
    tagDropdownSearch.value = "";
    renderTagDropdown("");
  });

  tagDropdownSearch.addEventListener("input", (e) => {
    renderTagDropdown(e.target.value);
  });
  clearTagSelection.addEventListener("click", () => {
    selectedSearchTags = [];
    tagDropdownSearch.value = "";
    syncSearchTagsInput();
    renderTagDropdown("");
  });
  document.addEventListener("click", (e) => {
    if (!e.target.closest(".tag-filter-wrap")) {
      tagDropdown.classList.add("hidden");
    }
  });
}

    async function loadRecipes() {
      const { data, error } = await supabase
        .from("recipes")
        .select("*")
        .order("created_at", { ascending: false });

  if (error) {
  console.error("LOAD ERROR:", error);
  alert("DB Fehler beim Laden: " + error.message);
  return;
}

      recipes = data || [];
renderRecipes();
renderTagDropdown("");
    }

    window.saveRecipe = async function () {
      const title = document.getElementById("name").value.trim();
     const rawTags = document.getElementById("tags").value.trim();
      const tags = sortTags(parseTags(rawTags)).join(", ");
      const status = document.getElementById("status").value;
      const ingredients = document.getElementById("ingredients").value.trim();
      const instructions = document.getElementById("instructions").value.trim();
      const imageFile = document.getElementById("image").files[0];

     if (!title || !ingredients || !instructions) {
  alert("Bitte mindestens Name, Zutaten und Zubereitung ausfüllen.");
  return;
}

let image_url = null;

if (editId !== null) {
  const existingRecipe = recipes.find(r => r.id === editId);
  image_url = existingRecipe?.image_url || null;
}

if (imageFile) {
  image_url = await uploadImage(imageFile);
  if (!image_url) return;
}

      if (editId === null) {
       const { error } = await supabase.from("recipes").insert([
      { title, tags, status, ingredients, instructions, image_url }
    ]);

 if (error) {
  console.error(error);
  alert("DB Fehler: " + error.message);
  return;
}
        
      } else {
        const { error } = await supabase
          .from("recipes")
       .update({ title, tags, status, ingredients, instructions, image_url })
          .eq("id", editId);

       if (error) {
  console.error("UPDATE ERROR:", error);
  alert("DB Fehler beim Aktualisieren: " + error.message);
  return;
}

        editId = null;
      }

      document.getElementById("name").value = "";
      document.getElementById("tags").value = "";
      document.getElementById("status").value = "tested";
      document.getElementById("image").value = "";
      document.getElementById("ingredients").value = "";
      document.getElementById("instructions").value = "";

      await loadRecipes();
    };

    window.renderRecipes = function () {
      const list = document.getElementById("recipeList");
      const searchTitle = document.getElementById("searchTitle").value.toLowerCase();
     const searchTags = selectedSearchTags.map(tag => tag.toLowerCase());
      const searchIngredients = document.getElementById("searchIngredients").value.toLowerCase();
      const searchStatus = document.getElementById("searchStatus").value;

      list.innerHTML = "";

const filteredRecipes = recipes.filter(recipe => {
  const titleMatch = (recipe.title || "").toLowerCase().includes(searchTitle);

 const recipeTags = parseTags(recipe.tags).map(tag => tag.toLowerCase());
const searchTagsArray = searchTags;

const tagsMatch =
  searchTagsArray.length === 0 ||
  searchTagsArray.every(searchTag => recipeTags.includes(searchTag));

  const ingredientsText = (recipe.ingredients || "").toLowerCase();

  const searchIngredientsArray = searchIngredients
    .toLowerCase()
    .split(/[,\n;]/)
    .map(i => i.trim())
    .filter(i => i);

  const ingredientsMatch =
    searchIngredientsArray.length === 0 ||
    searchIngredientsArray.every(searchIngredient =>
      ingredientsText.includes(searchIngredient)
    );

const recipeStatus = (recipe.status || "tested").toLowerCase();

const statusMatch =
  searchStatus === "all" || recipeStatus === searchStatus;

return titleMatch && tagsMatch && ingredientsMatch && statusMatch;
});

      if (filteredRecipes.length === 0) {
        list.innerHTML = "<p>Keine Rezepte gefunden.</p>";
        return;
      }

      filteredRecipes.forEach((recipe) => {
        const div = document.createElement("div");
        div.className = "recipe";
        const recipeStatus = (recipe.status || "tested").toLowerCase();
const statusLabel = recipeStatus === "new" ? "New" : "Tested";
const statusClass = recipeStatus === "new" ? "status-new" : "status-tested";

div.innerHTML = `
  <div class="recipe-title-row">
    <h3>${recipe.title}</h3>
    <span class="status-pill ${statusClass}">${statusLabel}</span>
  </div>
  ${recipe.image_url ? `<img src="${recipe.image_url}" alt="${recipe.title}" class="recipe-image">` : ""}
  <div class="tags">
    <span class="tags-label">Tags:</span>
    <div class="tags-list">
      ${
        ${
  sortTags(parseTags(recipe.tags)).length
    ? sortTags(parseTags(recipe.tags)).map(tag => `<span class="tag-pill">${tag}</span>`).join("")
    : `<span>-</span>`
}
    </div>
  </div>
  <p class="content-text"><strong>Zutaten:</strong><br>${linkify(recipe.ingredients || "")}</p>
  <p class="content-text"><strong>Zubereitung:</strong><br>${linkify(recipe.instructions || "")}</p>
  <div class="actions">
    <button onclick="editRecipe(${recipe.id})">Bearbeiten</button>
    <button onclick="deleteRecipe(${recipe.id})">Löschen</button>
  </div>
`;
        list.appendChild(div);
      });
    };

    window.deleteRecipe = async function (id) {
      if (!confirm("Willst du dieses Rezept wirklich löschen?")) return;

      const { error } = await supabase
        .from("recipes")
        .delete()
        .eq("id", id);

      if (error) {
        console.error("Fehler beim Löschen:", error);
        alert("Rezept konnte nicht gelöscht werden.");
        return;
      }

      await loadRecipes();
    };

    window.editRecipe = function (id) {
  const recipe = recipes.find(r => r.id === id);
  if (!recipe) return;

  document.getElementById("name").value = recipe.title || "";
  document.getElementById("tags").value = recipe.tags || "";
  document.getElementById("status").value = recipe.status || "tested";
  document.getElementById("image").value = "";
  document.getElementById("ingredients").value = recipe.ingredients || "";
  document.getElementById("instructions").value = recipe.instructions || "";

  editId = id;
  window.scrollTo({ top: 0, behavior: "smooth" });
};

   setupTagDropdown();
loadRecipes();
  </script>
</body>
</html>
