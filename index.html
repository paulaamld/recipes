<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Rezepte</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-top: 0;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .recipe {
      border-top: 1px solid #eee;
      padding-top: 12px;
      margin-top: 12px;
    }

    .recipe h3 {
      margin-bottom: 8px;
    }

    .small {
      color: #666;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .actions button {
      width: auto;
      padding: 10px 14px;
    }

    #search {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⭐️🌸🧸🌿 My Recipes ⭐️🌸🧸🌿</h1>

    <div class="card">
      <h2>New Recipe </h2>
      <input type="text" id="name" placeholder="Name" />
      <input type="text" id="tags" placeholder="Tags" />
      <textarea id="ingredients" placeholder="What"></textarea>
      <textarea id="instructions" placeholder="How"></textarea>
      <button onclick="saveRecipe()">Save⭐️</button>
    </div>

    <div class="card">
      <h2>Search</h2>
      <input type="text" id="Search" placeholder="Tags" oninput="renderRecipes()" />
    </div>

    <div class="card">
      <h2>Rezepte</h2>
      <div id="recipeList"></div>
    </div>
  </div>

  <script>
    let recipes = JSON.parse(localStorage.getItem("recipes")) || [];
    let editIndex = null;

    function saveRecipe() {
      const name = document.getElementById("name").value.trim();
      const tags = document.getElementById("tags").value.trim();
      const ingredients = document.getElementById("ingredients").value.trim();
      const instructions = document.getElementById("instructions").value.trim();

      if (!name || !ingredients || !instructions) {
        alert("Bitte mindestens Name, Zutaten und Zubereitung ausfüllen.");
        return;
      }

      const recipe = { name, tags, ingredients, instructions };

      if (editIndex === null) {
        recipes.push(recipe);
      } else {
        recipes[editIndex] = recipe;
        editIndex = null;
      }

      localStorage.setItem("recipes", JSON.stringify(recipes));

      document.getElementById("name").value = "";
      document.getElementById("tags").value = "";
      document.getElementById("ingredients").value = "";
      document.getElementById("instructions").value = "";

      renderRecipes();
    }

    function renderRecipes() {
      const list = document.getElementById("recipeList");
      const search = document.getElementById("search").value.toLowerCase();

      list.innerHTML = "";

      const filteredRecipes = recipes.filter(recipe =>
        recipe.name.toLowerCase().includes(search) ||
        recipe.tags.toLowerCase().includes(search) ||
        recipe.ingredients.toLowerCase().includes(search) ||
        recipe.instructions.toLowerCase().includes(search)
      );

      if (filteredRecipes.length === 0) {
        list.innerHTML = "<p>Keine Rezepte gefunden.</p>";
        return;
      }

      filteredRecipes.forEach((recipe) => {
        const realIndex = recipes.indexOf(recipe);

        const div = document.createElement("div");
        div.className = "recipe";
        div.innerHTML = `
          <h3>${recipe.name}</h3>
          <p><strong>Tags:</strong> ${recipe.tags || "-"}</p>
          <p class="small"><strong>Zutaten:</strong>\n${recipe.ingredients}</p>
          <p class="small"><strong>Zubereitung:</strong>\n${recipe.instructions}</p>
          <div class="actions">
            <button onclick="editRecipe(${realIndex})">Bearbeiten</button>
            <button onclick="deleteRecipe(${realIndex})">Löschen</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function deleteRecipe(index) {
      if (!confirm("Willst du dieses Rezept wirklich löschen?")) return;
      recipes.splice(index, 1);
      localStorage.setItem("recipes", JSON.stringify(recipes));
      renderRecipes();
    }

    function editRecipe(index) {
      const recipe = recipes[index];
      document.getElementById("name").value = recipe.name;
      document.getElementById("tags").value = recipe.tags;
      document.getElementById("ingredients").value = recipe.ingredients;
      document.getElementById("instructions").value = recipe.instructions;
      editIndex = index;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    renderRecipes();
  </script>
</body>
</html>
